<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="loginPage.css">
</head>
<body>

    <main class="login-wrapper">
        <h1>Login</h1>
        
        <form class="login-form" id ="loginForm">
            <input type="text" class="styled-input" id="userId" placeholder="ID..." required>
            <input type="password" class="styled-input" id="password" placeholder="Password..." required>
            
            <button type="submit" class="submit-btn">Sign In</button>
            
            <div class="register-link">
                <a href="registerPage.html">No account? Register here</a>
            </div>
        </form>
    </main>
    <script type="importmap">
        {
            "imports": {
                "axios": "https://cdn.jsdelivr.net/npm/axios@1.6.7/+esm"
            }
        }
    </script>
    <script type="module" src="loginPage.js"></script>
</body>
</html>
