<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="taskList.css">
   
</head>
<body>

    <aside class="sidebar-left">
        <div class="logo">
            <h2>To-Do List Menu</h2>
        </div>
        
        <nav class="nav-links">
            <a href="#" class="nav-item active">
                <span class="icon"></span> Tasks
            </a>
            <a href="credits.html" class="nav-item">
                <span class="icon"></span>
                Credits
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item logout">
                <span class="icon"></span>
                Sign Out
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h1>Task List <span class="count"></span></h1>
        </header>
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <div class="add-task-container">
            <input type="text" placeholder="Add New Task (Name only)..." class="add-task-input">
            <button class="add-btn">+</button>
        </div>

        <div class="task-list">
            
           
            </div>

        </div>
    </main>

    <aside class="sidebar-right">
        <div class="edit-header">
            <h3>Edit Task</h3>
        </div>

        <form class="edit-form">
            <div class="form-group">
                <label for="edit-name">Task Name</label>
                <input type="text" id="edit-name" value="Renew driver's license">
            </div>

            <div class="form-group">
                <label for="edit-desc">Description</label>
                <textarea id="edit-desc" placeholder="Add a description..."></textarea>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn-discard">Discard Changes</button>
                <button type="button" class="btn-save">Save Changes</button>
            </div>
        </form>
    </aside>
<script type="importmap">
        {
            "imports": {
                "axios": "https://cdn.jsdelivr.net/npm/axios@1.6.7/+esm"
            }
        }
    </script>
    <script type="module" src="taskList.js"></script>
</body>
</html>
